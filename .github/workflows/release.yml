name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build extension
        run: npm run build

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Package Chrome extension
        run: |
          cd dist/browser-extension/chrome
          zip -r ../../../hanzo-ai-chrome-${{ steps.version.outputs.version }}.zip .

      - name: Package Firefox extension
        run: |
          cd dist/browser-extension/firefox
          zip -r ../../../hanzo-ai-firefox-${{ steps.version.outputs.version }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.version }}
          files: |
            hanzo-ai-chrome-*.zip
            hanzo-ai-firefox-*.zip
          generate_release_notes: false
          body: |
            Hanzo AI Browser Extension ${{ steps.version.outputs.version }}

            ## Downloads
            - **Chrome**: `hanzo-ai-chrome-${{ steps.version.outputs.version }}.zip` — load unpacked from `chrome://extensions`
            - **Firefox**: `hanzo-ai-firefox-${{ steps.version.outputs.version }}.zip` — load as temporary add-on from `about:debugging`
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
